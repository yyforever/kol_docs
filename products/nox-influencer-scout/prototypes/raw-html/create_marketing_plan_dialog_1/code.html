<!DOCTYPE html>
<html class="" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Marketing Plan Dialog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#135bec",
            "background-light": "#f6f6f8",
            "background-dark": "#101622",
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Manrope', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<div class="w-full max-w-2xl overflow-hidden rounded-xl bg-white dark:bg-[#111318] shadow-2xl dark:shadow-black/50">
<div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-[#3b4354]">
<div class="flex flex-col gap-1">
<p class="text-xl font-bold text-gray-900 dark:text-white">Create New Marketing Plan</p>
<p class="text-sm text-gray-500 dark:text-[#9da6b9]">This plan provides context for AI-generated outreach emails.</p>
</div>
<button class="flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-[#1c1f27]">
<span class="material-symbols-outlined text-gray-500 dark:text-[#9da6b9]" data-icon="close">close</span>
</button>
</div>
<div class="p-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
<label class="flex flex-col md:col-span-2">
<p class="text-sm font-medium pb-2 text-gray-800 dark:text-white">Plan Name*</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-gray-300 bg-white focus:border-primary focus:ring-primary/20 focus:ring-2 dark:text-white dark:border-[#3b4354] dark:bg-[#1c1f27] dark:focus:border-primary h-12 px-4 text-sm font-normal placeholder:text-gray-400 dark:placeholder:text-[#9da6b9]" placeholder="e.g., 2024 Christmas Beauty Promotion" value=""/>
</label>
<label class="flex flex-col md:col-span-2">
<p class="text-sm font-medium pb-2 text-gray-800 dark:text-white">Brand/Product Introduction*</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-gray-300 bg-white focus:border-primary focus:ring-primary/20 focus:ring-2 dark:text-white dark:border-[#3b4354] dark:bg-[#1c1f27] dark:focus:border-primary min-h-32 p-4 text-sm font-normal placeholder:text-gray-400 dark:placeholder:text-[#9da6b9]" placeholder="Introduce your brand and key product selling points here..."></textarea>
</label>
</div>
<div class="mt-6">
<button class="flex items-center justify-between w-full text-left">
<h3 class="text-base font-bold text-gray-900 dark:text-white">Advanced Options</h3>
<span class="material-symbols-outlined text-gray-500 dark:text-[#9da6b9] transform transition-transform">expand_less</span>
</button>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5 pt-5">
<label class="flex flex-col">
<p class="text-sm font-medium pb-2 text-gray-800 dark:text-white">Cooperation Type</p>
<select class="form-select flex w-full min-w-0 flex-1 appearance-none rounded-lg border border-gray-300 bg-white focus:border-primary focus:ring-primary/20 focus:ring-2 dark:text-white dark:border-[#3b4354] dark:bg-[#1c1f27] dark:focus:border-primary h-12 px-4 text-sm font-normal text-gray-500 dark:text-[#9da6b9]">
<option value="">Select a cooperation type</option>
<option class="text-gray-900 dark:text-white" value="paid">Paid Promotion</option>
<option class="text-gray-900 dark:text-white" value="exchange">Product Exchange</option>
<option class="text-gray-900 dark:text-white" value="affiliate">Affiliate Commission</option>
</select>
</label>
<label class="flex flex-col">
<p class="text-sm font-medium pb-2 text-gray-800 dark:text-white">Desired Cooperation Form</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-gray-300 bg-white focus:border-primary focus:ring-primary/20 focus:ring-2 dark:text-white dark:border-[#3b4354] dark:bg-[#1c1f27] dark:focus:border-primary h-12 px-4 text-sm font-normal placeholder:text-gray-400 dark:placeholder:text-[#9da6b9]" placeholder="e.g., Instagram Post, YouTube Video" value=""/>
</label>
<label class="flex flex-col md:col-span-2">
<p class="text-sm font-medium pb-2 text-gray-800 dark:text-white">Product Link</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-gray-300 bg-white focus:border-primary focus:ring-primary/20 focus:ring-2 dark:text-white dark:border-[#3b4354] dark:bg-[#1c1f27] dark:focus:border-primary h-12 px-4 text-sm font-normal placeholder:text-gray-400 dark:placeholder:text-[#9da6b9]" placeholder="https://yourbrand.com/product" value=""/>
</label>
</div>
</div>
</div>
<div class="flex flex-col sm:flex-row items-center justify-between gap-4 p-6 border-t border-gray-200 dark:border-[#3b4354] bg-gray-50 dark:bg-[#1c1f27]/50 rounded-b-xl">
<p class="text-xs text-gray-500 dark:text-[#9da6b9] text-center sm:text-left">You can manage all plans in detail from your Juxing dashboard.</p>
<div class="flex items-center gap-3">
<button class="px-4 py-2.5 rounded-lg text-sm font-semibold text-gray-700 dark:text-white hover:bg-gray-100 dark:hover:bg-white/10">Cancel</button>
<button class="px-4 py-2.5 rounded-lg text-sm font-semibold text-white bg-primary hover:bg-primary/90">Create</button>
</div>
</div>
</div>
</div>

</body></html>
