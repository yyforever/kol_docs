<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Discover Tab - Search Setup (Unified Light Style)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#135bec",
            "background-light": "#f6f6f8",
            "background-dark": "#101622",
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-gray-100 font-display">
<div class="relative flex w-full flex-col bg-[#F8F9FC] group/design-root" style="max-width: 384px; height: 100vh; margin: auto;">
<div class="layout-container flex h-full grow flex-col">
<div class="flex flex-1 flex-col">
<div class="flex flex-col gap-4 p-4">
<div class="flex flex-col gap-1.5">
<p class="text-xs font-semibold text-slate-500">Campaign</p>
<div class="relative flex w-full">
<select class="w-full appearance-none rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-900 focus:border-primary focus:outline-none focus:ring-0">
<option>Summer Sale Campaign</option>
<option>New Influencer Program</option>
</select>
<span class="material-symbols-outlined pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-500">expand_more</span>
</div>
</div>
<div class="flex w-full items-center rounded-lg bg-slate-100 p-1">
<button class="flex h-8 flex-1 items-center justify-center rounded-md bg-white text-sm font-semibold text-primary shadow-sm">Similar</button>
<button class="flex h-8 flex-1 items-center justify-center rounded-md text-sm font-medium text-slate-500">AI Search</button>
<button class="flex h-8 flex-1 items-center justify-center rounded-md text-sm font-medium text-slate-500">Contact</button>
</div>
<div class="flex w-full items-center justify-start border-b border-slate-200">
<button class="flex h-9 items-center justify-center border-b-2 border-primary px-3 text-sm font-semibold text-primary">找相似详情</button>
<button class="flex h-9 items-center justify-center border-b-2 border-transparent px-3 text-sm font-medium text-slate-500 hover:text-slate-700">找相似列表</button>
</div>
</div>
<div class="layout-content-container flex flex-1 flex-col gap-5 overflow-y-auto px-4 pb-4">
<div class="flex flex-col gap-2">
<p class="text-sm font-semibold text-slate-900">Seed Creator Profile Link</p>
<div class="relative flex w-full">
<span class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">link</span>
<input class="form-input w-full rounded-lg border border-slate-200 bg-white py-2.5 pl-10 pr-4 text-sm text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-0 focus:ring-0" placeholder="请输入 TikTok / Instagram / ..."/>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-sm font-semibold text-slate-900">模式</p>
<div class="flex w-full items-center rounded-lg bg-slate-100 p-1">
<button class="flex h-8 flex-1 items-center justify-center rounded-md text-slate-500">
<span class="text-sm font-medium">免费</span>
</button>
<button class="flex h-8 flex-1 items-center justify-center rounded-md bg-white text-slate-900 shadow-sm">
<span class="text-sm font-medium">普通</span>
</button>
<button class="flex h-8 flex-1 items-center justify-center rounded-md text-slate-500">
<span class="text-sm font-medium">AI</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-sm font-semibold text-slate-900">地区</p>
<div class="relative flex w-full">
<select class="w-full appearance-none rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-0">
<option>全球</option>
</select>
<span class="material-symbols-outlined pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-500">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<p class="text-sm font-semibold text-slate-900">粉丝数</p>
<span class="text-sm text-slate-500">10k - 1M</span>
</div>
<div class="relative h-2 rounded-full bg-slate-200">
<div class="absolute h-2 rounded-full bg-primary" style="left: 10%; width: 40%;"></div>
<div class="absolute -top-1 size-4 rounded-full border-2 border-primary bg-white ring-2 ring-white" style="left: 10%;"></div>
<div class="absolute -top-1 size-4 rounded-full border-2 border-primary bg-white ring-2 ring-white" style="left: 50%;"></div>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-sm font-semibold text-slate-900">平均观看量</p>
<div class="flex items-center gap-2">
<input class="form-input w-full flex-1 rounded-lg border border-slate-200 bg-white p-2.5 text-center text-sm text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-0 focus:ring-0" value="1000"/>
<span class="material-symbols-outlined text-slate-400">arrow_forward</span>
<input class="form-input w-full flex-1 rounded-lg border border-slate-200 bg-white p-2.5 text-center text-sm text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-0 focus:ring-0" value="∞"/>
</div>
</div>
<div class="flex flex-col gap-3">
<p class="text-sm font-semibold text-slate-900">Platforms</p>
<div class="flex flex-wrap gap-2">
<button class="flex items-center justify-center gap-2 rounded-lg border border-primary bg-primary/10 px-3 py-1.5 text-primary">
<svg class="size-4" fill="currentColor" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
<path d="M224,64a8,8,0,0,1-8,8H120v88a24,24,0,1,1-32-22.63V88a8,8,0,0,1,16,0v48.55A40,40,0,1,0,136,176V72h80A8,8,0,0,1,224,64Z"></path>
</svg>
<span class="text-sm font-medium">TikTok</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-transparent px-3 py-1.5 text-slate-600">
<svg class="size-4" fill="currentColor" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
<path d="M128,80a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160ZM176,24H80A56.06,56.06,0,0,0,24,80v96a56.06,56.06,0,0,0,56,56h96a56.06,56.06,0,0,0,56-56V80A56.06,56.06,0,0,0,176,24Zm40,152a40,40,0,0,1-40,40H80a40,40,0,0,1-40-40V80A40,40,0,0,1,80,40h96a40,40,0,0,1,40,40ZM192,76a12,12,0,1,1-12-12A12,12,0,0,1,192,76Z"></path>
</svg>
<span class="text-sm font-medium">Instagram</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-lg border border-primary bg-primary/10 px-3 py-1.5 text-primary">
<svg class="size-4" fill="currentColor" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
<path d="M234.33,75.92a32.3,32.3,0,0,0-22.6-22.6C194.2,48,128,48,128,48s-66.2,0-83.73,5.32A32.3,32.3,0,0,0,21.67,75.92C16.35,93.45,16,128,16,128s.35,34.55,5.67,52.08a32.3,32.3,0,0,0,22.6,22.6C61.8,208,128,208,128,208s66.2,0,83.73-5.32a32.3,32.3,0,0,0,22.6-22.6C239.65,162.55,240,128,240,128S239.65,93.45,234.33,75.92ZM104,159.08V96.92l45.2,31.08Z"></path>
</svg>
<span class="text-sm font-medium">YouTube</span>
</button>
</div>
</div>
<div class="mt-auto pt-4">
<button class="flex h-12 w-full items-center justify-center gap-2 rounded-lg bg-slate-900 text-white shadow-lg shadow-slate-900/10">
<span class="font-semibold">根据</span>
<img alt="Creator avatar" class="size-6 rounded-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCse2bQ9KA6eoOyGp11uqBjYtKdVG0MfzIaERDNqv_7cBaVcoTBR3PcJlaEDvorFgEaA77E6IvjRLTFF_yHYM8xhshkIarNbbQpZ0n78PAd2LC-nAcrgwXB4EsEyPzDU-pEbC8zyZFgQtNES-J26-WI0ntBW_1W7e912yARZhjlViv_Zv9Ews-Z646oHY7q0To0E-FFVMO4xVzAwvdVi42AXijPd7jK327vGZKUFQTXtaEXKNZpCVZs9VTwqbc2R59IfwJCq9E9PSFV"/>
<span class="font-semibold">找相似</span>
</button>
</div>
</div>
</div>
</div>
</div>

</body></html>
