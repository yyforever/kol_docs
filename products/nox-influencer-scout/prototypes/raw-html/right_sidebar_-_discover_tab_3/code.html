<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Right Sidebar - AI Search Tab (Explore)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#135bec",
            "background-light": "#f6f6f8",
            "background-dark": "#101622",
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }::-webkit-scrollbar {
        width: 6px;
    }
    ::-webkit-scrollbar-track {
        background: transparent; 
    }
    ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
    }
</style>
</head>
<body class="bg-gray-100 font-display">
<div class="relative flex w-full flex-col bg-[#F8F9FC] group/design-root" style="max-width: 384px; height: 100vh; margin: auto;">
<div class="layout-container flex h-full grow flex-col">
<div class="flex flex-1 flex-col h-full">
<div class="flex flex-col gap-4 p-4 pb-0">
<div class="flex flex-col gap-1.5">
<p class="text-xs font-semibold text-slate-500">Campaign</p>
<div class="relative flex w-full">
<select class="w-full appearance-none rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-900 focus:border-primary focus:outline-none focus:ring-0">
<option>Summer Sale Campaign</option>
<option>New Influencer Program</option>
</select>
<span class="material-symbols-outlined pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-500">expand_more</span>
</div>
</div>
<div class="flex w-full items-center rounded-lg bg-slate-100 p-1">
<button class="flex h-8 flex-1 items-center justify-center rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">Similar</button>
<button class="flex h-8 flex-1 items-center justify-center rounded-md bg-white text-sm font-semibold text-primary shadow-sm">AI Search</button>
<button class="flex h-8 flex-1 items-center justify-center rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">Contact</button>
</div>
</div>
<div class="px-4 py-3 border-b border-slate-200">
<div class="flex w-full items-center rounded-lg bg-slate-200/50 p-1">
<button class="flex h-8 flex-1 items-center justify-center rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 transition-all">AI 精选任务</button>
<button class="flex h-8 flex-1 items-center justify-center rounded-md bg-white text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-black/5">AI 探索任务</button>
</div>
</div>
<div class="layout-content-container flex flex-1 flex-col gap-5 overflow-y-auto px-4 py-5">
<div class="flex flex-col gap-2">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px] text-primary">auto_awesome</span>
<p class="text-sm font-semibold text-slate-900">网红需求</p>
</div>
<div class="relative w-full">
<textarea class="form-textarea w-full resize-none rounded-lg border border-slate-200 bg-white p-3 text-sm text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-0 focus:ring-0 leading-relaxed" placeholder="描述您的需求...
例如：寻找北美地区，粉丝互动率高的科技类博主，专注于智能家居评测..." rows="5"></textarea>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-sm font-semibold text-slate-900">地区</p>
<div class="relative flex w-full">
<select class="w-full appearance-none rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-0">
<option>全球</option>
<option>North America</option>
<option>Europe</option>
<option>Asia-Pacific</option>
</select>
<span class="material-symbols-outlined pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-500">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<p class="text-sm font-semibold text-slate-900">粉丝数</p>
<span class="text-sm text-slate-500">10k - 1M</span>
</div>
<div class="relative h-2 rounded-full bg-slate-200 cursor-pointer group/slider">
<div class="absolute h-2 rounded-full bg-primary" style="left: 10%; width: 40%;"></div>
<div class="absolute -top-1 size-4 rounded-full border-2 border-primary bg-white ring-2 ring-white shadow-sm transition-transform group-hover/slider:scale-110" style="left: 10%;"></div>
<div class="absolute -top-1 size-4 rounded-full border-2 border-primary bg-white ring-2 ring-white shadow-sm transition-transform group-hover/slider:scale-110" style="left: 50%;"></div>
</div>
</div>
<div class="flex flex-col gap-2">
<p class="text-sm font-semibold text-slate-900">平均观看量</p>
<div class="flex items-center gap-2">
<div class="relative flex-1">
<input class="form-input w-full rounded-lg border border-slate-200 bg-white p-2.5 text-center text-sm text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-0 focus:ring-0" value="1,000"/>
</div>
<span class="material-symbols-outlined text-slate-400 text-[16px]">arrow_forward</span>
<div class="relative flex-1">
<input class="form-input w-full rounded-lg border border-slate-200 bg-white p-2.5 text-center text-sm text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-0 focus:ring-0" value="∞"/>
</div>
</div>
</div>
<div class="rounded-lg bg-blue-50 border border-blue-100 p-3 flex gap-3 items-start">
<span class="material-symbols-outlined text-blue-500 text-[20px] shrink-0 mt-0.5">info</span>
<div class="flex flex-col gap-1">
<p class="text-xs font-semibold text-blue-900">长时间任务</p>
<p class="text-xs text-blue-700 leading-tight">AI 将深度探索未被记录的网红数据，此过程可能需要较长时间，结果将分批次通知您。</p>
</div>
</div>
<div class="mt-auto pt-2 pb-2">
<button class="flex h-12 w-full items-center justify-center gap-2 rounded-lg bg-primary text-white shadow-lg shadow-primary/20 hover:bg-blue-600 transition-colors">
<span class="material-symbols-outlined text-[20px]">rocket_launch</span>
<span class="font-semibold">开始 AI 探索</span>
</button>
</div>
</div>
</div>
</div>
</div>
</body></html>
